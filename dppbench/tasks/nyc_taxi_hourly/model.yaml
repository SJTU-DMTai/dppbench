model: LightGBM
model_params:
  task: regression
  seed: 42
  n_estimators: 1500
  learning_rate: 0.05
  num_leaves: 64
  max_depth: 7
  min_child_samples: 50
  colsample_bytree: 0.8
  subsample: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.1

train:
  val_ratio: 0.2
  metrics: [rmse, mae, r2]
  seed: 42

model_options:
  LightGBM: {}
  LSTM:
    model_params:
      task: regression
      seed: 42
      seq_len: 24
      hidden_size: 64
      num_layers: 1
      dropout: 0.0
      lr: 0.001
      batch_size: 256
      epochs: 10
      device: cpu
    train: &nyc_taxi_hourly_ts_train
      val_ratio: 0.2
      metrics: [rmse, mae, r2]
      seed: 42
  Transformer:
    model_params:
      task: regression
      seed: 42
      seq_len: 24
      d_model: 64
      nhead: 4
      num_layers: 2
      dim_feedforward: 128
      dropout: 0.1
      lr: 0.001
      batch_size: 256
      epochs: 10
      device: cpu
    train: *nyc_taxi_hourly_ts_train
