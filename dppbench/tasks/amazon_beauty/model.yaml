model: DIN
model_params:
  embedding_dim: 16
  dnn_hidden_units: [256, 128]
  dnn_activation: dice
  att_hidden_size: [80, 40]
  att_activation: Dice
  att_weight_normalization: false
  dnn_dropout: 0.2
  l2_reg_embedding: 0.000001
  seed: 42
  task: binary
  device: cpu

feature:
  seq_cols:
    item_id_seq: item_id
    cate_id_seq: item_brand
  seq_max_len: 20
  target_col: rating
  label_rule:
    mode: ge
    threshold: 0
    positive_label: 1
    negative_label: 0

std_test:
  cold_start_user_filter:
    min_train_interactions: 2

train:
  optimizer: adam
  lr: 0.001
  weight_decay: 0.00001
  batch_size: 256
  epochs: 20
  val_ratio: 0.1
  seed: 42
  metrics: [auc]
  early_stopping_monitor: auc
  early_stopping_patience: 5

model_options:
  FNN:
    model_params:
      embedding_dim: 16
      dnn_hidden_units: [256, 128]
      dnn_activation: dice
      dnn_dropout: 0.2
      l2_reg_embedding: 0.000001
      seed: 42
      task: binary
      device: cpu
    train: &amazon_beauty_rec_train
      optimizer: adam
      lr: 0.001
      weight_decay: 0.00001
      batch_size: 256
      epochs: 20
      val_ratio: 0.1
      seed: 42
      metrics: [auc]
      early_stopping_monitor: auc
      early_stopping_patience: 5
    feature:
      seq_cols:
        item_id_seq: item_id
        cate_id_seq: item_brand
      seq_max_len: 20
  DeepFM:
