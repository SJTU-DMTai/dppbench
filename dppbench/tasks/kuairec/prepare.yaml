dag:
  sources:
  - id: s0
    table: interaction
  - id: s1
    table: user
  - id: s2
    table: item
  ops:
  - id: o1
    op: JoinTable
    prev:
    - s0
    - s2
    - s1
    params:
      user_col: user_id
      item_col: item_id
      how: left
      method: rec
  - id: o2
    op: DropColumns
    prev:
    - o1
    params:
      cols:
      - time
      - date
      - play_duration
      - video_duration
  - id: o3
    op: FilterSample
    prev:
    - o2
    params:
      subset:
      - user_id
      - item_id
      - watch_ratio
  - id: o4
    op: HandleMV
    prev:
    - o3
    params:
      cols:
      - item_video_duration
      - item_video_width
      - item_video_height
      method: median
  - id: o5
    op: FilterKCore
    prev:
    - o4
    params:
      user_col: user_id
      item_col: item_id
      k: 5
  - id: o6
    op: CreateSequence
    prev:
    - o5
    params:
      user_col: user_id
      item_col: item_id
      time_col: timestamp
      seq_col: item_id_seq
      max_len: 20
  - id: o7
    op: SampleNegative
    prev:
    - o6
    params:
      user_col: user_id
      item_col: item_id
      target_col: watch_ratio
      n_negatives: 1
      positive_label: 1
      negative_label: 0
      seed: 42
  - id: o8
    op: FilterSample
    prev:
    - o7
    params:
      subset:
      - watch_ratio
  train:
    prev:
    - o8
