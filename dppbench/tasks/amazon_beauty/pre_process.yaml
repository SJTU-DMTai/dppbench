pipeline:
- op: Deduplicate
  target: item
  params:
    subset: [item_id]
    keep: first
- op: HandleMV
  target: item
  params:
    cols: [item_brand]
    na_values: [""]
    action: mark
- op: JoinTable
  target: interaction
  params:
    user_col: user_id
    item_col: item_id
    user_df: $user_df
    item_df: $item_df
    how: left
    method: rec
- op: HandleMV
  target: interaction
  params:
    cols: [item_brand]
    method: constant
    fill_value: 0
    action: impute
- op: FilterKCore
  target: interaction
  params:
    user_col: user_id
    item_col: item_id
    k: 2
- op: CreateSequence
  target: interaction
  params:
    user_col: user_id
    item_col: item_id
    time_col: timestamp
    seq_col: item_id_seq
    max_len: 20
- op: CreateSequence
  target: interaction
  params:
    user_col: user_id
    item_col: item_brand
    time_col: timestamp
    seq_col: cate_id_seq
    max_len: 20
- op: SampleNegative
  target: interaction
  params:
    user_col: user_id
    item_col: item_id
    target_col: rating
    n_negatives: 1
    positive_label: 1
    negative_label: 0
    seed: 42
