pipeline:
- op: CreateFeature
  target: train
  params:
    source_cols:
    - PM10
    - SO2
    - NO2
    - CO
    - O3
    output_col: co_pollutant_sum
    method: sum
- op: CreateFeature
  target: train
  params:
    source_cols:
    - TEMP
    - DEWP
    output_col: temp_dewp_diff
    method: diff
- op: TransformPower
  target: train
  params:
    cols:
    - RAIN
    - WSPM
    output_cols:
    - rain_log
    - wind_log
    method: log
- op: ScaleFeature
  target: train
  params:
    cols:
    - WSPM
    - TEMP
    feature_range:
    - 0.0
    - 1.0
    method: minmax
- op: CreateLagFeature
  target: train
  params:
    target_col: PM2.5
    lags:
    - 1
    - 3
    - 6
    - 12
    - 24
    group_cols:
    - station
    time_col: _sort_idx
- op: CreateRollingFeature
  target: train
  params:
    target_col: PM2.5
    windows:
    - 6
    - 24
    - 168
    aggs:
    - mean
    - std
    - min
    - max
    group_cols:
    - station
    time_col: _sort_idx
- op: CustomProcess
  target: station_meta
  params:
    cols:
    - PM2.5
    mode: drop_columns
- op: JoinTable
  target: train
  params:
    aux_df: $station_meta
    key_col: station
    prefix: STATION
    max_cols: 20
    method: agg
- op: CustomProcess
  target: train
  params:
    threshold: 0.7
    mode: drop_high_null
- op: LabelEncode
  target: train
  params:
    cols:
    - wd
    - station
- op: HandleMV
  target: train
  params:
    method: median
