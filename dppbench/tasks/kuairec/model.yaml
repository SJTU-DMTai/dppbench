model: DIN
model_params:
  embedding_dim: 8
  dnn_hidden_units: [128, 64]
  att_hidden_size: [32, 16]
  dnn_dropout: 0.3
  l2_reg_embedding: 0.0001
  seed: 42
  task: binary
  device: cpu

feature:
  seq_cols:
    item_id_seq: item_id
  seq_max_len: 20
  target_col: watch_ratio
  label_rule:
    mode: ge
    threshold: 2.0
    positive_label: 1
    negative_label: 0

std_test:
  cold_start_user_filter:
    min_train_interactions: 3  # Minimum user interactions in the frozen training window.

train:
  optimizer: adam
  lr: 0.0005
  weight_decay: 0.00001
  batch_size: 512
  epochs: 10
  metrics: [auc]
  early_stopping_monitor: auc
  early_stopping_patience: 3

model_options:
  FNN:
    model_params:
      embedding_dim: 8
      dnn_hidden_units: [128, 64]
      dnn_dropout: 0.3
      l2_reg_embedding: 0.0001
      seed: 42
      task: binary
      device: cpu
    train: &kuairec_rec_train
      optimizer: adam
      lr: 0.0005
      weight_decay: 0.00001
      batch_size: 512
      epochs: 10
      metrics: [auc]
      early_stopping_monitor: auc
      early_stopping_patience: 3
  DeepFM:
    model_params:
      embedding_dim: 8
      dnn_hidden_units: [128, 64]
      dnn_dropout: 0.3
      l2_reg_embedding: 0.0001
      seed: 42
      task: binary
      device: cpu
    train: *kuairec_rec_train
  DIN:
    model_params:
      embedding_dim: 8
      dnn_hidden_units: [128, 64]
      att_hidden_size: [32, 16]
      dnn_dropout: 0.3
      l2_reg_embedding: 0.0001
      seed: 42
      task: binary
      device: cpu
    train: *kuairec_rec_train
  DIEN:
    model_params:
      embedding_dim: 8
      dnn_hidden_units: [128, 64]
      att_hidden_size: [32, 16]
      gru_hidden_size: 8
      dnn_dropout: 0.3
      l2_reg_embedding: 0.0001
      seed: 42
      task: binary
      device: cpu
    train: *kuairec_rec_train
  SIM:
    model_params:
      embedding_dim: 8
      dnn_hidden_units: [128, 64]
      att_hidden_size: [32, 16]
      sim_top_k: 10
      dnn_dropout: 0.3
      l2_reg_embedding: 0.0001
      seed: 42
      task: binary
      device: cpu
    train: *kuairec_rec_train
